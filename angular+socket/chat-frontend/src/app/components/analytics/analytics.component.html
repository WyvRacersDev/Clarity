
<div class="analytics-container">
  <div class="analytics-header">
    <h1>Analytics</h1>
    <div class="tag-selector">
      <mat-chip-set>
        <mat-chip-option
            *ngFor="let tag of availableTags"
            [selected]="selectedTags.includes(tag)"
            (click)="toggleTag(tag)">
          {{ tag }}
        </mat-chip-option>
      </mat-chip-set>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h2>Tasks per day</h2>
      <div class="chart-area">
        <div *ngIf="!lineChartReady" class="chart-loading">
          <mat-spinner diameter="40" style="--mdc-circular-progress-active-indicator-color: #00D4FF;"></mat-spinner>
          <p>Loading chart data...</p>
        </div>
        <canvas *ngIf="lineChartReady"
          baseChart
          #lineChart
          id="lineChart"
          [data]="lineChartData"
          [type]="'line'"
          [options]="lineChartOptions">
        </canvas>
      </div>
    </div>

    <div class="chart-card">
      <h2>Completion rate</h2>
      <div class="chart-area">
        <div *ngIf="!completionChartReady" class="chart-loading">
          <mat-spinner diameter="40" style="--mdc-circular-progress-active-indicator-color: #00D4FF;"></mat-spinner>
          <p>Loading chart data...</p>
        </div>
        <canvas *ngIf="completionChartReady"
          baseChart
          #barChart
          id="barChart"
          [data]="completionChartData"
          [type]="'bar'"
          [options]="barChartOptions">
        </canvas>
      </div>
    </div>
  </div>
</div>
