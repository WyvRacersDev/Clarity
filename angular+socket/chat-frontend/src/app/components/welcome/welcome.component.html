<div class="welcome-container" (click)="playAudioOnInteraction()">
  <audio #backgroundMusic loop>
    <source src="/assets/welcome-music.mp3" type="audio/mpeg">
  </audio>

  <button class="mute-btn" (click)="toggleMute(); $event.stopPropagation()" [class.muted]="isMuted">
    <svg *ngIf="!isMuted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <svg *ngIf="isMuted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  </button>

  <div class="stars-background"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="welcome-content">
    <h1 class="app-title">
      <span class="title-welcome">Welcome to</span>
      <span class="title-clarity">Clarity</span>
    </h1>

    <p class="tagline">An All-in-One Productivity App</p>

    <button class="enter-btn" (click)="enterApp()">
      Enter Clarity
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <div class="credits">
      <span class="credits-label">Created by</span>
      <div class="team-members">
        <span class="member">Bilal Kashif</span>
        <span class="member">Mohammad Hamza Iqbal</span>
        <span class="member">Mawahid Abbas</span>
      </div>
    </div>
  </div>
</div>
