<div class="welcome-container" (click)="playAudioOnInteraction()">
  <audio #backgroundMusic loop>
    <source src="/assets/welcome-music.mp3" type="audio/mpeg">
  </audio>

  <button class="mute-btn" (click)="toggleMute(); $event.stopPropagation()" [class.muted]="isMuted">
    <svg *ngIf="!isMuted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <svg *ngIf="isMuted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  </button>

  <!-- Subtle ambient glow -->
  <div class="ambient-glow"></div>

  <!-- Legacy elements (hidden via CSS) -->
  <div class="stars-background"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="welcome-content">
    <h1 class="app-title">
      <span class="title-welcome">Welcome to</span>
      <span class="title-clarity">Clarity</span>
    </h1>

    <p class="tagline">An All-in-One Productivity App</p>

    <!-- Auth Form -->
    <div class="auth-container" *ngIf="!isLoading">
      <!-- Mode Toggle -->
      <div class="auth-toggle">
        <button [class.active]="isLoginMode" (click)="isLoginMode = true; clearError()">Login</button>
        <button [class.active]="!isLoginMode" (click)="isLoginMode = false; clearError()">Sign Up</button>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            required
            email
          />
        </div>

        <!-- Username (only for signup) -->
        <div class="form-group" *ngIf="!isLoginMode">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Choose a username"
            [required]="!isLoginMode"
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required
            minlength="6"
          />
        </div>

        <!-- Error Message -->
        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">{{ isLoginMode ? 'Login' : 'Create Account' }}</span>
          <span *ngIf="isLoading">Please wait...</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Google Login -->
      <button class="google-btn" (click)="loginWithGoogle()" [disabled]="isLoading">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Demo Mode -->
      <button class="demo-btn" (click)="enterAsDemo()" [disabled]="isLoading">
        Try Demo Mode
      </button>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Please wait...</p>
    </div>

    <div class="credits">
      <span class="credits-label">Created by</span>
      <div class="team-members">
        <span class="member">Bilal Kashif</span>
        <span class="member">Mohammad Hamza Iqbal</span>
        <span class="member">Mawahid Abbas</span>
      </div>
    </div>
  </div>
</div>
